# =========================================
# 몽글픽 AI Agent CI/CD 워크플로우
# =========================================
# PR/push → pytest 테스트 + ruff 린트 (GitHub 호스팅 러너)
# develop push → 스테이징 맥북에서 직접 배포 (Self-hosted 러너)
#
# 사전 준비:
#   스테이징 맥북에 GitHub Actions self-hosted runner 설치 완료

name: CI/CD

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

# 동시 배포 방지
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── CI: 테스트 + 린트 (GitHub 호스팅 러너) ───
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      # 의존성 설치 (lockfile 없이 pyproject.toml에서 직접 해석)
      - name: Install dependencies
        run: uv sync

      # 린트 체크 (경고만, 실패 차단하지 않음)
      - name: Lint
        run: uv run --with ruff -- ruff check src/ || true

      - name: Test
        run: |
          PYTHONPATH=src uv run --with pytest --with pytest-asyncio --with httpx \
            -- python -m pytest tests/ -v --tb=short -q \
            --ignore=tests/unit/test_image_security.py

  # ─── CD: 스테이징 배포 (Self-hosted 러너에서 직접 실행) ───
  deploy:
    name: Deploy to Staging
    needs: test
    runs-on: self-hosted
    timeout-minutes: 10
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'

    steps:
      # self-hosted 러너에서 최신 코드 checkout
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy Agent container
        run: |
          set -e
          echo "========== AI Agent 배포 시작 =========="

          PROJECT_DIR="${PROJECT_DIR:-/Users/yoonhyungjoo/Documents/monglepick}"

          # checkout된 코드를 프로젝트 디렉토리에 동기화
          rsync -a --delete --exclude='.venv' --exclude='__pycache__' --exclude='.env' \
            "$GITHUB_WORKSPACE/" "$PROJECT_DIR/monglepick-agent/"

          cd "$PROJECT_DIR"

          # Agent 컨테이너만 재빌드 + 재시작 (DB 건드리지 않음)
          docker compose -f docker-compose.staging.yml up -d --build --no-deps ai-agent

          # 헬스체크 대기 (최대 30초)
          echo ">>> Agent 헬스체크 대기..."
          for i in 1 2 3 4 5 6; do
            if curl -sf "http://localhost:8000/health" > /dev/null 2>&1; then
              echo "  ✅ Agent OK"
              break
            fi
            echo "  ⏳ Agent starting... ($i/6)"
            sleep 5
          done

          echo "========== ✅ AI Agent 배포 완료 =========="
