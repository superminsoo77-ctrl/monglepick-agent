# =========================================
# 몽글픽 AI Agent 운영 배포 워크플로우 (Production CD)
# =========================================
# 기준 문서: docs/인프라_배포_가이드.md §6.3 (2026-04-16 최종 운영 배포 실측)
#
# 인프라 실체:
#   - VM2(10.20.0.11) 앱 서버에 docker compose v2 로 3개 서비스 운영
#     (서비스명: spring-boot / monglepick-agent / monglepick-recommend)
#   - VM2 compose: ~/monglepick/docker-compose.prod.app.yml
#   - 이미지 태그 정책: 기존 로컬 태그(monglepick-agent:3.1)에서 본 CI 부터 GHCR 로 전환
#   - 환경변수: ~/monglepick/.env.prod → .env 동기화 필수 (§6.3 Step 3-0)
#   - VM1(210.109.15.187) bastion 경유 VM2 SSH
#
# 배포 흐름:
#   1) pytest
#   2) Docker Buildx linux/amd64 → GHCR push (ghcr.io/<owner>/monglepick-agent:{sha}, :latest)
#   3) VM1 ProxyJump → VM2 SSH
#   4) compose 파일의 monglepick-agent 서비스 image: 값을 GHCR SHA 태그로 교체 (백업 .bak.<TS>)
#   5) .env.prod → .env 동기화
#   6) docker pull + compose up -d --no-deps --force-recreate monglepick-agent
#   7) 헬스체크 + 실패 시 compose 백업 복원 (자동 롤백)
#
# 필요 GitHub Secrets:
#   DEPLOY_SSH_KEY / VM1_HOST / VM2_HOST / VM_USER
#   SLACK_WEBHOOK_URL (선택) — 설정 시 배포 완료/실패 시 슬랙 채널로 알림 전송.
#                              미설정이면 notify 잡이 안전하게 스킵된다.

name: CD (Production)

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "배포할 이미지 태그 (비우면 HEAD SHA 사용)"
        required: false
        default: ""

concurrency:
  group: cd-prod-agent
  cancel-in-progress: false

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/monglepick-agent
  COMPOSE_SERVICE: monglepick-agent
  CONTAINER_NAME: monglepick-agent
  HEALTHCHECK_URL: http://localhost:8000/health
  VM2_PROJECT_DIR: /home/ubuntu/monglepick

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - name: Install dependencies
        run: uv sync
      - name: Test
        run: |
          PYTHONPATH=src uv run --with pytest --with pytest-asyncio --with httpx \
            -- python -m pytest tests/ -v --tb=short -q \
            --ignore=tests/unit/test_image_security.py

  build-and-push:
    name: Build & Push Image
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.resolve.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - name: Resolve image tag
        id: resolve
        run: |
          INPUT_TAG="${{ github.event.inputs.image_tag }}"
          if [ -n "$INPUT_TAG" ]; then
            echo "tag=$INPUT_TAG" >> $GITHUB_OUTPUT
            echo "SKIP_BUILD=true" >> $GITHUB_ENV
          else
            echo "tag=${{ github.sha }}" >> $GITHUB_OUTPUT
            echo "SKIP_BUILD=false" >> $GITHUB_ENV
          fi
      - name: Setup Docker Buildx
        if: env.SKIP_BUILD == 'false'
        uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        if: env.SKIP_BUILD == 'false'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push (linux/amd64)
        if: env.SKIP_BUILD == 'false'
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.resolve.outputs.tag }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to VM2
    needs: build-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    steps:
      - name: Setup SSH (ProxyJump via VM1)
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          cat >> ~/.ssh/config <<EOF
          Host vm1
            HostName ${{ secrets.VM1_HOST }}
            User ${{ secrets.VM_USER }}
            IdentityFile ~/.ssh/id_ed25519
            StrictHostKeyChecking accept-new
            ServerAliveInterval 30
            ServerAliveCountMax 20

          Host vm2
            HostName ${{ secrets.VM2_HOST }}
            User ${{ secrets.VM_USER }}
            IdentityFile ~/.ssh/id_ed25519
            ProxyJump vm1
            StrictHostKeyChecking accept-new
            ServerAliveInterval 30
            ServerAliveCountMax 20
          EOF

      - name: Deploy via SSH
        env:
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          COMPOSE_SERVICE: ${{ env.COMPOSE_SERVICE }}
          CONTAINER_NAME: ${{ env.CONTAINER_NAME }}
          HEALTHCHECK_URL: ${{ env.HEALTHCHECK_URL }}
          VM2_PROJECT_DIR: ${{ env.VM2_PROJECT_DIR }}
          REPO_SOURCE: https://github.com/${{ github.repository }}
        run: |
          ssh vm2 \
            IMAGE_TAG="$IMAGE_TAG" \
            IMAGE_NAME="$IMAGE_NAME" \
            COMPOSE_SERVICE="$COMPOSE_SERVICE" \
            CONTAINER_NAME="$CONTAINER_NAME" \
            HEALTHCHECK_URL="$HEALTHCHECK_URL" \
            VM2_PROJECT_DIR="$VM2_PROJECT_DIR" \
            REPO_SOURCE="$REPO_SOURCE" \
            bash -s <<'REMOTE'
          set -euo pipefail
          cd "$VM2_PROJECT_DIR"

          TS=$(date +%Y%m%d-%H%M%S)
          echo ">>> [1/6] compose 파일 백업 (롤백용): docker-compose.prod.app.yml.bak.$TS"
          cp docker-compose.prod.app.yml "docker-compose.prod.app.yml.bak.$TS"

          echo ">>> [2/6] .env.prod → .env 동기화 (§6.3 Step 3-0)"
          cp .env.prod .env

          echo ">>> [3/6] compose image 값을 GHCR SHA 태그로 교체 (service: $COMPOSE_SERVICE)"
          python3 - <<PY
          import re, sys, os
          p = "docker-compose.prod.app.yml"
          s = open(p).read()
          service = os.environ["COMPOSE_SERVICE"]
          new_image = f"{os.environ['IMAGE_NAME']}:{os.environ['IMAGE_TAG']}"
          pattern = re.compile(
              r'(^\s{2,4}' + re.escape(service) + r':\s*\n(?:\s{4,}.*\n)*?\s{4,}image:\s*)\S+',
              re.MULTILINE,
          )
          s2, n = pattern.subn(r'\g<1>' + new_image, s, count=1)
          if n == 0:
              sys.stderr.write(f"ERROR: service {service} image 라인 찾지 못함\n")
              sys.exit(1)
          open(p, "w").write(s2)
          print(f"image 교체 완료: {new_image}")
          PY

          # 2026-04-24: pull 전 디스크 자동 정리 — 정책: "running + 신규 = 최대 2개"
          # VM2 디스크 여유 좁아 (8.7GB) 구 이미지 누적되면 pull 실패 반복.
          # 본 서비스의 running 중이 아닌 모든 이미지 제거 → running 1개만 남김 → pull 후 정확히 2개.
          # docker rmi 는 in-use 이미지를 자동 거부하므로 running 컨테이너는 보호된다.
          echo ">>> [3.5/6] 디스크 사전 정리 (본 서비스 미사용 이미지 전부 제거)"
          echo "    [dangling] 태그 없는 이미지"
          docker image prune -f 2>&1 | tail -1 || true
          echo "    [본 서비스 미사용 이미지] running 제외 전부 제거"
          docker images "${IMAGE_NAME}" -q 2>/dev/null | sort -u \
            | xargs -r docker rmi 2>&1 | tail -5 || true
          echo "    [전역 dangling + 24h 이상] 미사용 이미지"
          docker image prune -a -f --filter "until=24h" 2>&1 | tail -1 || true
          echo "    [build cache]"
          docker builder prune -f --filter "until=24h" 2>&1 | tail -1 || true
          echo "    정리 후 디스크:"
          df -h / | head -2

          echo ">>> [4/6] 이미지 pull + 서비스 재시작"
          PREV_IMAGE_ID=$(docker inspect --format='{{.Image}}' "$CONTAINER_NAME" 2>/dev/null || echo "")
          echo "    직전 이미지: $PREV_IMAGE_ID"
          # pull 실패 시 compose 가 이미 sed 교체된 상태라 up 도 실패하는 악순환 방지.
          # pull 단계에서 즉시 백업 복원 후 exit — 다음 실행도 깨끗한 상태.
          if ! docker pull "${IMAGE_NAME}:${IMAGE_TAG}"; then
            echo "❌ GHCR pull 실패 — compose 파일 즉시 복원 후 종료 (up 시도 안 함)"
            cp "docker-compose.prod.app.yml.bak.$TS" docker-compose.prod.app.yml
            echo "    복원된 image 라인:"
            grep -E "^\s{4,}image:" docker-compose.prod.app.yml || true
            exit 1
          fi
          docker compose -f docker-compose.prod.app.yml --env-file .env.prod \
            up -d --no-deps --force-recreate "$COMPOSE_SERVICE"

          echo ">>> [5/6] 헬스체크 (최대 60초)"
          HEALTHY=false
          for i in $(seq 1 10); do
            if curl -sf -m 3 "$HEALTHCHECK_URL" > /dev/null 2>&1; then
              echo "    ✅ Agent OK ($i/10)"
              HEALTHY=true
              break
            fi
            echo "    ⏳ Agent starting... ($i/10)"
            sleep 6
          done

          if [ "$HEALTHY" = "false" ]; then
            echo "❌ 헬스체크 실패 — compose 백업으로 롤백"
            cp "docker-compose.prod.app.yml.bak.$TS" docker-compose.prod.app.yml
            docker compose -f docker-compose.prod.app.yml --env-file .env.prod \
              up -d --no-deps --force-recreate "$COMPOSE_SERVICE" || true
            docker inspect "$CONTAINER_NAME" \
              --format 'RestartCount={{.RestartCount}} Status={{.State.Status}}' || true
            docker logs "$CONTAINER_NAME" --tail 80 2>&1 | head -80 || true
            exit 1
          fi

          echo ">>> [6/6] 구 이미지/백업 정리"
          docker image prune -f --filter "label=org.opencontainers.image.source=${REPO_SOURCE}" || true
          find . -maxdepth 1 -name "docker-compose.prod.app.yml.bak.*" -type f -mtime +7 -delete || true

          echo "✅ Agent 배포 완료: ${IMAGE_NAME}:${IMAGE_TAG}"
          REMOTE

  # =========================================================================
  # 배포 결과 슬랙 알림
  # =========================================================================
  # - test / build-and-push / deploy 세 잡 결과를 종합해 슬랙으로 단일 카드 전송.
  # - `if: always()` 로 실패/취소 시에도 호출 — 깨진 단계를 즉시 공유.
  # - SLACK_WEBHOOK_URL Secret 미설정 시 조용히 스킵.
  # - 커밋 메시지 다줄/특수문자 안전을 위해 payload 는 python json.dumps 로 빌드.
  notify:
    name: Slack Notify
    needs: [test, build-and-push, deploy]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Resolve overall status
        id: status
        env:
          TEST: ${{ needs.test.result }}
          BUILD: ${{ needs.build-and-push.result }}
          DEPLOY: ${{ needs.deploy.result }}
        run: |
          if [ "$DEPLOY" = "success" ] && [ "$TEST" = "success" ] && [ "$BUILD" = "success" ]; then
            echo "status=success" >> "$GITHUB_OUTPUT"
            echo "emoji=:white_check_mark:" >> "$GITHUB_OUTPUT"
            echo "title=운영 배포 완료" >> "$GITHUB_OUTPUT"
          elif [ "$DEPLOY" = "cancelled" ] || [ "$BUILD" = "cancelled" ] || [ "$TEST" = "cancelled" ]; then
            echo "status=cancelled" >> "$GITHUB_OUTPUT"
            echo "emoji=:black_circle:" >> "$GITHUB_OUTPUT"
            echo "title=운영 배포 취소됨" >> "$GITHUB_OUTPUT"
          else
            echo "status=failure" >> "$GITHUB_OUTPUT"
            echo "emoji=:x:" >> "$GITHUB_OUTPUT"
            echo "title=운영 배포 실패" >> "$GITHUB_OUTPUT"
          fi

      - name: Send Slack webhook
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          EMOJI: ${{ steps.status.outputs.emoji }}
          TITLE: ${{ steps.status.outputs.title }}
          SERVICE: monglepick-agent
          TEST_RESULT: ${{ needs.test.result }}
          BUILD_RESULT: ${{ needs.build-and-push.result }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
          SHA: ${{ github.sha }}
          BRANCH: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          if [ -z "${SLACK_WEBHOOK_URL:-}" ]; then
            echo "ℹ️ SLACK_WEBHOOK_URL Secret 미설정 — 알림 스킵"
            exit 0
          fi

          PAYLOAD=$(python3 <<'PY'
          import json, os
          sha = (os.environ.get("SHA") or "")[:7]
          image_tag = (os.environ.get("IMAGE_TAG") or "")[:12]
          emoji = os.environ["EMOJI"]
          title = os.environ["TITLE"]
          service = os.environ["SERVICE"]
          msg = (os.environ.get("COMMIT_MSG") or "").split("\n")[0][:200]

          fields = [
              {"type": "mrkdwn", "text": f"*서비스*\n{service}"},
              {"type": "mrkdwn", "text": f"*브랜치*\n`{os.environ['BRANCH']}`"},
              {"type": "mrkdwn", "text": f"*커밋*\n`{sha}`"},
              {"type": "mrkdwn", "text": f"*이미지 태그*\n`{image_tag}`"},
              {"type": "mrkdwn", "text": f"*실행자*\n{os.environ['ACTOR']}"},
              {"type": "mrkdwn", "text": f"*테스트 / 빌드 / 배포*\n{os.environ['TEST_RESULT']} / {os.environ['BUILD_RESULT']} / {os.environ['DEPLOY_RESULT']}"},
          ]
          blocks = [
              {"type": "header", "text": {"type": "plain_text", "text": f"{emoji} {service} — {title}", "emoji": True}},
              {"type": "section", "fields": fields},
          ]
          if msg:
              blocks.append({"type": "section", "text": {"type": "mrkdwn", "text": f"*커밋 메시지*\n{msg}"}})
          blocks.append({"type": "section", "text": {"type": "mrkdwn", "text": f"<{os.environ['RUN_URL']}|:mag: 워크플로우 실행 로그 보기>"}})

          print(json.dumps({
              "text": f"{service} {title}",
              "blocks": blocks,
          }, ensure_ascii=False))
          PY
          )

          HTTP_CODE=$(curl -sS -o /tmp/slack-resp.txt -w "%{http_code}" \
            -X POST -H "Content-Type: application/json" \
            --data "$PAYLOAD" "$SLACK_WEBHOOK_URL" || echo "000")
          echo "Slack HTTP $HTTP_CODE — $(cat /tmp/slack-resp.txt 2>/dev/null || true)"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "⚠️ Slack 전송 실패 (HTTP $HTTP_CODE) — 배포 결과는 유효"
          fi
