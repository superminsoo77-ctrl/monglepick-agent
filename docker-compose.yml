version: "3.8"

services:
  # ── Vector DB ──
  qdrant:
    image: qdrant/qdrant:v1.13.2
    container_name: monglepick-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      - QDRANT__LOG_LEVEL=INFO
      # 벡터/페이로드를 디스크에 저장하여 메모리 사용량 절감 (117만건 × 4096차원 대응)
      - QDRANT__STORAGE__ON_DISK_PAYLOAD=true
    mem_limit: 6g
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ── Knowledge Graph ──
  neo4j:
    image: neo4j:5-community
    container_name: monglepick-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    environment:
      - NEO4J_AUTH=neo4j/monglepick_dev
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_memory_heap_max__size=1G
    mem_limit: 2g
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "monglepick_dev", "RETURN 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Cache + Checkpointer ──
  redis:
    image: redis:7-alpine
    container_name: monglepick-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 2gb --maxmemory-policy allkeys-lru
    mem_limit: 2g
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── RDB ──
  mysql:
    image: mysql:8.0
    container_name: monglepick-mysql
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    environment:
      - MYSQL_ROOT_PASSWORD=monglepick_root
      - MYSQL_DATABASE=monglepick
      - MYSQL_USER=monglepick
      - MYSQL_PASSWORD=monglepick_dev
      - TZ=Asia/Seoul
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --default-authentication-plugin=caching_sha2_password
    mem_limit: 1g
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pmonglepick_root"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── BM25 Search (Nori 한국어 분석기 포함) ──
  elasticsearch:
    build:
      context: .
      dockerfile: elasticsearch.Dockerfile
    container_name: monglepick-elasticsearch
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    mem_limit: 1g
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      redis:
        condition: service_healthy

volumes:
  qdrant_storage:
  neo4j_data:
  redis_data:
  mysql_data:
  es_data:
